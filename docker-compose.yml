# Local parity with the Azure Container Apps deploy: 2 services.
# Backend is internal-only (exposed to the frontend on the compose network);
# the nginx frontend is the single public entrypoint and proxies /api → backend.
#
#   docker compose up --build   → open http://localhost
services:
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    env_file: .env          # Azure OpenAI credentials from the git-ignored root .env
    expose:
      - "8005"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8005/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "80:80"
    environment:
      - BACKEND_HOST=backend
      - BACKEND_PORT=8005
    depends_on:
      backend:
        condition: service_healthy
