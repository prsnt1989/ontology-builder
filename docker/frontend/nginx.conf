worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    server {
        listen 80;
        server_name _;

        # Runtime DNS re-resolution (Azure Container Apps internal IPs can rotate).
        resolver ${DNS_RESOLVER} valid=10s ipv6=off;

        # Backend API — includes the SSE-style streaming pipeline endpoints
        # (/api/pipeline, /api/pipeline/update). Buffering MUST be off so chunks
        # flush to the browser immediately.
        location /api/ {
            set $backend "${BACKEND_HOST}";
            proxy_pass http://$backend:${BACKEND_PORT};
            proxy_http_version 1.1;
            proxy_set_header Host ${BACKEND_HOST};
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Static SPA with client-side routing fallback.
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
